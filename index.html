<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OPE Assessor - Zero-Friction Assessment Portal with Privacy First">
    <meta name="theme-color" content="#0F1724">
    <title>OPE Assessor</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260429-sync-fix-3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
/* DESIGN SYSTEM - tokens, typography, spacing (8px grid), components */
:root{
  --space-1: 8px;
  --space-2: 16px;
  --space-3: 24px;
  --space-4: 32px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;

  --font-sans: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;

  /* Updated colors: subtle neutral gradient background + calm blue accent */
  --bg-start: #f0f6ff;
  --bg-end: #f8fbff;
  --bg: linear-gradient(180deg,var(--bg-start),var(--bg-end));
  --surface: #ffffff;
  --muted: #6B7280;
  --text: #0F1724;
  --primary: #0EA5E9; /* single accent */
  --primary-600: #0891B2;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --border: rgba(15,23,42,0.06);
  --elevation-1: 0 6px 20px rgba(11,18,32,0.04);
}

/* Base */
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
a{color:var(--primary)}
.container{max-width:1150px;margin:0 auto;padding:calc(var(--space-3))}

/* Typography scale */
.h1{font-size:28px;font-weight:800;line-height:1.15;margin:0 0 var(--space-2)}
.h2{font-size:20px;font-weight:700;margin:0 0 var(--space-2)}
.h3{font-size:16px;font-weight:600;margin:0 0 var(--space-1)}
.body{font-size:14px;line-height:1.6;color:var(--text)}
.small{font-size:13px;color:var(--muted)}

/* Card */
.card{background:var(--surface);border-radius:var(--radius-md);padding:var(--space-3);box-shadow:var(--elevation-1);border:1px solid var(--border)}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);padding:var(--space-2) var(--space-3);background:transparent;border-bottom:1px solid rgba(11,18,32,0.04)}
.brand{display:flex;align-items:center;gap:12px}
.brand .title{font-weight:800;color:var(--text);font-size:18px}
.top-actions{display:flex;align-items:center;gap:12px}

/* Header nav buttons */
.header-nav{display:flex;gap:8px;align-items:center}
.header-nav .nav-btn{background:transparent;border:1px solid transparent;padding:8px 12px;border-radius:8px;color:var(--muted);cursor:pointer}
.header-nav .nav-btn.active{background:rgba(14,165,233,0.08);color:var(--primary-600);font-weight:700;border-color:rgba(14,165,233,0.12)}

/* Sidebar */
.layout{display:flex;gap:var(--space-4);min-height:calc(100vh - 72px)}
.sidebar{width:240px;flex:0 0 240px;padding:var(--space-3);position:sticky;top:20px;height:calc(100vh - 40px);background:linear-gradient(180deg,#fbfeff,#f4fbff);border-radius:12px;border:1px solid rgba(6,182,212,0.04)}
.sidebar .nav-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;color:var(--muted);cursor:pointer}
.sidebar .nav-item.active{background:linear-gradient(90deg,rgba(14,165,233,0.06),rgba(6,182,212,0.03));color:var(--primary-600);font-weight:600}
.sidebar .section-title{font-size:12px;color:var(--muted);text-transform:uppercase;margin-top:var(--space-3);margin-bottom:6px}

/* Main content */
.main{flex:1;padding:var(--space-3);min-height:calc(100vh - 72px)}
.grid-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3)}
@media (max-width:1024px){.grid-cards{grid-template-columns:repeat(2,1fr)}}
@media (max-width:640px){.layout{flex-direction:column}.sidebar{display:none}.grid-cards{grid-template-columns:1fr}}

/* Overview card */
.stat{display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding:var(--space-3)}
.stat .value{font-weight:800;font-size:20px;color:var(--text)}
.stat .label{font-size:13px;color:var(--muted)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:10px;padding:10px 14px;font-weight:600;cursor:pointer;border:1px solid transparent}
.btn-primary{background:linear-gradient(90deg,var(--primary),var(--primary-600));color:white}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:6px 10px;font-size:13px}

/* Exam header */
.exam-header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--border);background:transparent}
.exam-meta{display:flex;align-items:center;gap:12px}
.timer{font-family:var(--font-mono);font-weight:700;color:var(--danger);background:#fff;padding:6px 10px;border-radius:8px;border:1px solid rgba(239,68,68,0.06)}

/* Question card */
.question-card{padding:var(--space-3);border-radius:var(--radius-md);background:var(--surface);box-shadow:var(--elevation-1);border:1px solid var(--border)}
.options{display:flex;flex-direction:column;gap:12px;margin-top:12px}

/* Palette (right panel) */
.palette{width:220px;padding:var(--space-2);border-radius:12px;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid var(--border)}
.palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.palette-item{height:44px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;background:white}
.palette-answered{background:linear-gradient(180deg,#ECFDF5,#D1FAE5);border-color:rgba(16,185,129,0.12);color:var(--success)}
.palette-current{box-shadow:0 4px 18px rgba(14,165,233,0.12);outline:2px solid rgba(14,165,233,0.12)}
.palette-flagged{background:linear-gradient(180deg,#FFFBEB,#FEF3C7);border-color:rgba(245,158,11,0.12);color:var(--warning)}

/* Mobile FAB for palette */
.fab-palette{position:fixed;right:18px;bottom:18px;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--primary);color:#fff;box-shadow:0 8px 22px rgba(14,165,233,0.18);z-index:40}

/* Toast & utilities reuse existing notification styles */
    </style>
</head>
<body class="">
  <!-- Ensure app root exists and layout will be driven by app.js -->
  <div id="app"></div>

  <!-- SheetJS (XLSX) - for Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  
  <!-- FileSaver - for file downloads -->
  <script src="https://cdn.jsdelivr.net/npm/file-saver/dist/FileSaver.min.js"></script>
  
  <!-- PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <script src="config.js?v=20260429-sync-fix-3"></script>
  <script src="repository.js?v=20260429-sync-fix-3"></script>
  <script src="presenter.js?v=20260429-sync-fix-3"></script>
  <script src="app.js?v=20260429-sync-fix-3"></script>
  
  <script>
      // Initialize shared-state sync before first render when available
      if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => {
              if (typeof initializeApp === 'function') {
                  initializeApp();
              } else if (typeof render === 'function') {
                  render();
              }
          });
      } else {
          if (typeof initializeApp === 'function') {
              initializeApp();
          } else if (typeof render === 'function') {
              render();
          }
      }
  </script>
  
  <script>
      if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('service-worker.js').catch(err => {
              console.log('ServiceWorker registration failed: ', err);
          });
      }
  </script>
</body>
</html>
